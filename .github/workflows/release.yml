name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  DOWNLOAD_BASE_URL: http://download.yunisdu.com/tide

jobs:
  # ====================
  # macOS
  # ====================
  build-macos:
    name: macOS - ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build APP
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package APP
        run: cargo packager --release --target ${{ matrix.target }} --formats dmg

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: tide-macos-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/*.dmg

  # ====================
  # Windows
  # ====================
  build-windows:
    name: Windows - ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86_64
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            arch: aarch64
            runner: windows-11-arm
          # - target: i686-pc-windows-msvc
          #   arch: i686
          #   runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build APP
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package APP
        run: cargo packager --release --target ${{ matrix.target }} --formats nsis

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: tide-windows-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/*.exe

  # ====================
  # Create Release
  # ====================
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Collect all files
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import sys

          release_dir = Path("release")
          release_dir.mkdir(exist_ok=True)

          def copy_one(folder, suffix, output_name, predicate=lambda name: True):
              source_dir = Path("artifacts") / folder
              matches = sorted(
                  path for path in source_dir.glob(f"*{suffix}")
                  if predicate(path.name.lower())
              )
              if len(matches) != 1:
                  print(f"Expected exactly one {suffix} artifact in {source_dir}, found {len(matches)}", file=sys.stderr)
                  for match in matches:
                      print(f"  - {match}", file=sys.stderr)
                  sys.exit(1)
              shutil.copy2(matches[0], release_dir / output_name)

          copy_one("tide-macos-aarch64", ".dmg", "Tide_aarch64.dmg")
          copy_one("tide-macos-x86_64", ".dmg", "Tide_x86_64.dmg")
          copy_one(
              "tide-windows-aarch64",
              ".exe",
              "tide_aarch64-setup.exe",
              lambda name: "setup" in name or "installer" in name,
          )
          copy_one(
              "tide-windows-x86_64",
              ".exe",
              "tide_x86_64-setup.exe",
              lambda name: "setup" in name or "installer" in name,
          )
          PY
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Fetch auto-generated release notes from GitHub
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${GITHUB_REF#refs/tags/}" \
            -f target_commitish="${GITHUB_SHA}" \
            -q .body > gh_notes.md || echo "" > gh_notes.md

          # 2. Parse and group commits using Python
          python3 -c '
          import os

          try:
              lines = open("gh_notes.md").read().split("\n")
          except Exception:
              lines = []

          feat, fix, optimized = [], [], []

          for line in lines:
              if line.strip().startswith("* "):
                  content = line[2:].strip()
                  # Remove the trailing " by @user in https..."
                  if " by @" in content:
                      content = content.split(" by @")[0]

                  lower_content = content.lower()
                  if lower_content.startswith("feat:"):
                      msg = content.split(":", 1)[1].strip()
                      if msg: feat.append("- " + msg[0].upper() + msg[1:])
                  elif lower_content.startswith("fix:"):
                      msg = content.split(":", 1)[1].strip()
                      if msg: fix.append("- " + msg[0].upper() + msg[1:])
                  elif lower_content.startswith("perf:") or lower_content.startswith("opt:"):
                      msg = content.split(":", 1)[1].strip()
                      if msg: optimized.append("- " + msg[0].upper() + msg[1:])

          with open("grouped_notes.md", "w", encoding="utf-8") as f:
              if feat:
                  f.write("### ✨ New Features\n\n" + "\n".join(feat) + "\n\n")
              if fix:
                  f.write("### 🐛 Bug Fixes\n\n" + "\n".join(fix) + "\n\n")
              if optimized:
                  f.write("### 🔧 Optimizations\n\n" + "\n".join(optimized) + "\n\n")
          '

          # 3. Rename grouped notes to release notes
          mv grouped_notes.md release_notes.md

      - name: Generate latest manifest
        run: |
          python3 - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import json
          import os

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          base_url = os.environ["DOWNLOAD_BASE_URL"].rstrip("/")
          notes = Path("release_notes.md").read_text(encoding="utf-8").strip()

          manifest = {
              "version": version,
              "notes": notes,
              "pub_date": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "platforms": {
                  "macos-aarch64": {
                      "url": f"{base_url}/{version}/Tide_aarch64.dmg",
                  },
                  "macos-x86_64": {
                      "url": f"{base_url}/{version}/Tide_x86_64.dmg",
                  },
                  "windows-x86_64": {
                      "url": f"{base_url}/{version}/tide_x86_64-setup.exe",
                  },
                  "windows-aarch64": {
                      "url": f"{base_url}/{version}/tide_aarch64-setup.exe",
                  },
              },
          }

          Path("latest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          python3 -m json.tool latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
            latest.json
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure SSH
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST secret}"
          : "${DEPLOY_KEY:?Missing DEPLOY_KEY secret}"

          port="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$port" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload to download server
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST secret}"
          : "${DEPLOY_ROOT:?Missing DEPLOY_ROOT secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER secret}"

          version="${GITHUB_REF_NAME#v}"
          port="${DEPLOY_PORT:-22}"
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          remote_version_dir="${DEPLOY_ROOT}/tide/${version}"

          ssh -i ~/.ssh/deploy_key -p "$port" "$remote" "mkdir -p '$remote_version_dir'"
          scp -i ~/.ssh/deploy_key -P "$port" release/* "$remote:$remote_version_dir/"
          scp -i ~/.ssh/deploy_key -P "$port" latest.json "$remote:${DEPLOY_ROOT}/tide/latest.json"
